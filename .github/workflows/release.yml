name: CI and Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  attestations: write
  contents: write
  id-token: write
  packages: write
  security-events: write

env:
  BUN_VERSION: 1.3.11

jobs:
  changes:
    name: Detect Docker-impacting changes
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docker:
              - 'Dockerfile'
              - 'entrypoint.sh'
              - 'supervisord.conf'
              - 'docker-compose.yml'
              - 'backend/**'
              - 'frontend/**'

  test:
    name: Lint, Tests, Typecheck, and Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tuesday_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: tuesday_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tuesday_test -d tuesday_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://tuesday_test:test_password@127.0.0.1:5432/tuesday_test
      LOG_LEVEL: warn
      NODE_ENV: test
      RUN_DB_INTEGRATION_TESTS: 'true'
      SESSION_SECRET: integration-session-secret-32-chars-minimum
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install backend dependencies
        run: bun install --frozen-lockfile
        working-directory: backend

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile
        working-directory: frontend

      - name: Backend typecheck
        run: bun run typecheck
        working-directory: backend

      - name: Backend lint
        run: bun run lint
        working-directory: backend

      - name: Backend tests
        run: bun run test
        working-directory: backend

      - name: Backend coverage (warn-only)
        continue-on-error: true
        run: bun run test:coverage
        working-directory: backend

      - name: Upload backend coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage
          if-no-files-found: warn

      - name: Backend production build
        run: bun run build
        working-directory: backend

      - name: Frontend typecheck
        run: bunx tsc --noEmit
        working-directory: frontend

      - name: Frontend lint
        run: bun run lint
        working-directory: frontend

      - name: Frontend tests
        run: bun test
        working-directory: frontend

      - name: Frontend production build
        run: bun run build
        working-directory: frontend

      - name: Frontend bundle size budgets (warn-only)
        run: bun run size || echo "size-limit warnings reported (non-blocking)"
        working-directory: frontend

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  trivy:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  smoke:
    name: Smoke Deploy Image
    runs-on: ubuntu-latest
    needs: [changes, test, codeql, trivy]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')) && (startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.docker == 'true')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build smoke image
        run: docker build -t tuesday-smoke:ci .

      - name: Run smoke checks
        run: |
          set -euo pipefail
          cleanup() {
            docker rm -f tuesday-smoke >/dev/null 2>&1 || true
            docker volume rm tuesday_smoke_data >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker volume create tuesday_smoke_data >/dev/null
          docker run -d --name tuesday-smoke -p 7002:8080 -v tuesday_smoke_data:/app/data tuesday-smoke:ci >/dev/null

          wait_for_ready() {
            for _ in $(seq 1 60); do
              if curl -fsS http://127.0.0.1:7002/ready >/dev/null; then
                return 0
              fi
              sleep 2
            done
            echo "Timed out waiting for /ready"
            docker logs tuesday-smoke
            return 1
          }

          wait_for_ready
          curl -fsS http://127.0.0.1:7002/health >/dev/null
          curl -fsS http://127.0.0.1:7002/ready >/dev/null
          curl -fsS http://127.0.0.1:7002/api/v1/setup/status >/dev/null
          curl -fsS http://127.0.0.1:7002/ >/dev/null

          docker restart tuesday-smoke >/dev/null
          wait_for_ready

          docker logs tuesday-smoke 2>&1 | jq -Rr 'fromjson? | select(.message == "server.started") | .message' | grep -q '^server.started$'

  docker:
    name: Build, Sign, and Publish GHCR Image
    runs-on: ubuntu-latest
    needs: [changes, test, codeql, trivy, smoke]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')) && (startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.docker == 'true')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: image
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/${repo}"
          short_sha="${GITHUB_SHA::7}"

          tags=(
            "${image}:${GITHUB_SHA}"
            "${image}:sha-${short_sha}"
          )

          if [[ "${GITHUB_REF}" == "refs/heads/master" || "${GITHUB_REF}" == refs/tags/v* ]]; then
            tags+=("${image}:latest")
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
            tags+=("${image}:${GITHUB_REF_NAME}" "${image}:${version}")
          fi

          {
            echo "image=${image}"
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.title=Tuesday
            org.opencontainers.image.description=Tuesday self-hosted project management tool
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Sign published image
        run: cosign sign --yes "${{ steps.image.outputs.image }}@${{ steps.build.outputs.digest }}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.image.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Generate image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.image.outputs.image }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload image SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-sbom
          path: sbom.spdx.json

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: docker
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes --verify-tag

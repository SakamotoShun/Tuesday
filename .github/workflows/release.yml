name: CI and Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  changes:
    name: Detect Docker-impacting changes
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docker:
              - 'Dockerfile'
              - 'entrypoint.sh'
              - 'supervisord.conf'
              - 'docker-compose.yml'
              - 'backend/**'
              - 'frontend/**'

  test:
    name: Tests and Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install backend dependencies
        run: bun install --frozen-lockfile
        working-directory: backend

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile
        working-directory: frontend

      - name: Backend typecheck
        run: bun run typecheck
        working-directory: backend

      - name: Frontend typecheck
        run: bunx tsc --noEmit
        working-directory: frontend

      - name: Backend tests
        run: bun test
        working-directory: backend

      - name: Frontend tests
        run: bun test
        working-directory: frontend

  docker:
    name: Build and Push GHCR Image
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.docker == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: image
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/${repo}"
          short_sha="${GITHUB_SHA::7}"

          tags=(
            "${image}:${GITHUB_SHA}"
            "${image}:sha-${short_sha}"
          )

          if [[ "${GITHUB_REF}" == "refs/heads/master" || "${GITHUB_REF}" == refs/tags/v* ]]; then
            tags+=("${image}:latest")
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
            tags+=("${image}:${GITHUB_REF_NAME}" "${image}:${version}")
          fi

          {
            echo "image=${image}"
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.title=Tuesday
            org.opencontainers.image.description=Tuesday self-hosted project management tool
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: docker
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes --verify-tag
